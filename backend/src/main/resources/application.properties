spring.application.name=BorderSync Backend
server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:h2:file:./data/bordersync;MODE=PostgreSQL;AUTO_SERVER=TRUE}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=false
spring.flyway.enabled=false

app.jwt.secret=${JWT_SECRET:BorderSyncDevelopmentSecretKey2026ChangeInProduction!}
app.jwt.expiration-hours=${JWT_EXPIRATION_HOURS:8}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
app.bootstrap.admin-email=${ADMIN_EMAIL:admin@bordersync.cl}
app.bootstrap.admin-password=${ADMIN_PASSWORD:Admin2026!}

server.error.include-message=never
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
