services:
  - type: web
    name: bordersync-api
    runtime: docker
    plan: free
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /actuator/health
    autoDeployTrigger: commit
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: postgres
      - key: DB_HOST
        fromDatabase:
          name: bordersync-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: bordersync-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: bordersync-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: bordersync-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: bordersync-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://bordersync.vercel.app

databases:
  - name: bordersync-db
    plan: free
    databaseName: bordersync
    user: bordersync
